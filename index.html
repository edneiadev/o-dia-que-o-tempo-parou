<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O Dia que o Tempo Parou - Jogo de Matemática</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7ff;
      --card: #ffffff;
      --primary: #304ffe;
      --primary-dark: #1e35c6;
      --text: #18213a;
      --ok: #0f9d58;
      --error: #c62828;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    main {
      width: min(700px, 100%);
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(24, 33, 58, 0.12);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      line-height: 1.3;
    }

    p { margin: 0 0 16px; }

    .levels {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      background: #e7ebff;
      color: var(--primary-dark);
    }

    button.active {
      background: var(--primary);
      color: #fff;
    }

    .question {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    input[type="number"] {
      flex: 1;
      min-width: 180px;
      font-size: 1rem;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #b8c2ff;
    }

    #submitAnswer {
      background: var(--primary);
      color: #fff;
    }

    #submitAnswer:hover { background: var(--primary-dark); }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      font-weight: 700;
      margin-top: 8px;
    }

    #feedback.ok { color: var(--ok); }
    #feedback.error { color: var(--error); }

    .hidden { display: none; }
  </style>
</head>
<body>
  <main>
    <h1>Jogo pedagógico de matemática</h1>
    <p>Escolha um nível e resolva 5 desafios de medida de tempo (horas e minutos).</p>

    <div class="levels" role="group" aria-label="Níveis de dificuldade">
      <button type="button" data-level="facil" class="active">Fácil</button>
      <button type="button" data-level="medio">Médio</button>
      <button type="button" data-level="dificil">Difícil</button>
    </div>

    <section id="game" aria-live="polite">
      <div class="question" id="question">Carregando...</div>
      <div class="controls">
        <label class="hidden" for="answer">Resposta</label>
        <input id="answer" type="number" inputmode="numeric" placeholder="Digite sua resposta" />
        <button type="button" id="submitAnswer">Responder</button>
      </div>
      <div id="feedback"></div>
      <div class="status">
        <span id="progress">Pergunta: 1/5</span>
        <span id="score">Pontuação: 0</span>
      </div>
    </section>
  </main>

  <script>
    const TOTAL_QUESTIONS = 5;
    const levelButtons = Array.from(document.querySelectorAll('[data-level]'));
    const questionEl = document.getElementById('question');
    const answerEl = document.getElementById('answer');
    const submitAnswerButton = document.getElementById('submitAnswer');
    const feedbackEl = document.getElementById('feedback');
    const progressEl = document.getElementById('progress');
    const scoreEl = document.getElementById('score');

    const gameState = {
      level: 'facil',
      index: 1,
      score: 0,
      currentAnswer: null,
      finished: false,
    };

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function makeQuestion(level) {
      if (level === 'facil') {
        const hour = randomInt(1, 9);
        const addMinutes = randomInt(1, 5) * 10;
        return {
          text: `Se são ${hour}:00 e passam ${addMinutes} minutos, que horas serão? (responda apenas os minutos finais, ex.: ${hour}:30 => 30)`,
          answer: addMinutes,
        };
      }

      if (level === 'medio') {
        const hour = randomInt(1, 10);
        const currentMinutes = randomInt(0, 5) * 10;
        const plusMinutes = randomInt(2, 6) * 10;
        const total = currentMinutes + plusMinutes;
        return {
          text: `Em um relógio marca ${hour}:${String(currentMinutes).padStart(2, '0')}. Somando ${plusMinutes} minutos, qual será o total de minutos?`,
          answer: total % 60,
        };
      }

      const h1 = randomInt(1, 10);
      const m1 = randomInt(0, 5) * 10;
      const h2 = h1 + randomInt(1, 2);
      const m2 = randomInt(0, 5) * 10;
      const start = h1 * 60 + m1;
      const end = h2 * 60 + m2;
      return {
        text: `Quanto tempo passou de ${h1}:${String(m1).padStart(2, '0')} até ${h2}:${String(m2).padStart(2, '0')}? (em minutos)`,
        answer: end - start,
      };
    }

    function renderNewQuestion() {
      const question = makeQuestion(gameState.level);
      gameState.currentAnswer = question.answer;
      questionEl.textContent = question.text;
      progressEl.textContent = `Pergunta: ${gameState.index}/${TOTAL_QUESTIONS}`;
      scoreEl.textContent = `Pontuação: ${gameState.score}`;
      feedbackEl.textContent = '';
      feedbackEl.className = '';
      answerEl.value = '';
      answerEl.focus();
    }

    function setLevel(level) {
      gameState.level = level;
      gameState.index = 1;
      gameState.score = 0;
      gameState.finished = false;
      levelButtons.forEach((button) => {
        button.classList.toggle('active', button.dataset.level === level);
      });
      submitAnswerButton.disabled = false;
      answerEl.disabled = false;
      renderNewQuestion();
    }

    function endGame() {
      gameState.finished = true;
      questionEl.textContent = `Fim do nível ${gameState.level}. Você fez ${gameState.score} de ${TOTAL_QUESTIONS} pontos!`;
      progressEl.textContent = 'Jogo encerrado';
      submitAnswerButton.disabled = true;
      answerEl.disabled = true;
    }

    function checkAnswer() {
      if (gameState.finished) {
        return;
      }

      const typedValue = Number(answerEl.value);
      if (Number.isNaN(typedValue)) {
        feedbackEl.textContent = 'Digite um número válido.';
        feedbackEl.className = 'error';
        return;
      }

      if (typedValue === gameState.currentAnswer) {
        gameState.score += 1;
        feedbackEl.textContent = 'Muito bem! Resposta correta.';
        feedbackEl.className = 'ok';
      } else {
        feedbackEl.textContent = `Quase! A resposta correta era ${gameState.currentAnswer}.`;
        feedbackEl.className = 'error';
      }

      scoreEl.textContent = `Pontuação: ${gameState.score}`;

      if (gameState.index >= TOTAL_QUESTIONS) {
        endGame();
        return;
      }

      gameState.index += 1;
      setTimeout(renderNewQuestion, 600);
    }

    levelButtons.forEach((button) => {
      button.addEventListener('click', () => setLevel(button.dataset.level));
    });

    submitAnswerButton.addEventListener('click', checkAnswer);
    answerEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        checkAnswer();
      }
    });

    renderNewQuestion();
  </script>
</body>
</html>
